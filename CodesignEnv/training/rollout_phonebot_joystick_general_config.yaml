## General Phonebot rollout (MuJoCo CPU) recording videos.
##
## Run:
##   python load_and_rollout_phonebot_joystick_general.py
##   python load_and_rollout_phonebot_joystick_general.py rollout_phonebot_joystick_general_config.yaml
##
## `job_name` can be: string | list[string] | "all"

# Default behavior (can be overridden per-job / per-rollout):
# - show_contact: draw MuJoCo contact points/forces in rendered MP4s
# - record_json: save qpos/qvel/qacc/actuator_force JSON next to the videos
# - auto_plot:   generate matplotlib plots from that JSON (uses `data_plotter.py`)
# record_json: true
# auto_plot: true

show_contact: true
record_json: false
auto_plot: false
plot:
  figsize_per_subplot: [12, 2.5]
  dpi: 150


# xml_path takes priority for the MuJoCo rollout. 
# If you set xml_path, the script will always load that XML and will not use env_name/task to pick a different scene.

# Does env_name + task still “take effect” if xml_path is specified?
# Yes, but only for other purposes, not for choosing the XML:

# Brax policy loading fallback: 
#     - if ppo_checkpoint.load_policy can't be used, it calls _load_brax_policy(...), which uses env_name/task to build an MJX env and restore the checkpoint.
# Torque controller reuse + action_scale: 
#     - if env_name and task are provided, it builds env_for_controller:


# job_name: phonebot_flat_fv2_torque_ankle_brax
# job_name: phonebot_flat_fv2_torque_brax_curriculum_v1_home_straight
# job_name: phonebot_flat_fv2_torque_tflite_home_straight
# job_name: phonebot_flat_fv2_torque_tflite_home_straight_on_rough_terrain
# job_name: phonebot_rough_fv2_torque_tflite_home_straight_on_rough_terrain
# job_name: phonebot_rough_fv2_torque_tflite_home_straight_on_flat_terrain
job_name: phonebot_flat_fv2_torque_tflite_home_straight_on_full_collision
# job_name: phonebot_rough_fv2_torque_tflite_home_straight_on_flat_terrain_on_full_collision


jobs:
  phonebot_flat_fv2_torque_ankle_brax:
    policy_format: brax     # brax|tflite|auto
    policy_path: checkpoints/PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision_flat

    # Explicit scene XML
    xml_path: models/model_phonebot_fred_v2_torque_version/scene_joystick_flat_terrain_alter_v2_ankle_collision.xml

    # Used only for Brax fallback restore + torque controller reuse
    env_name: PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision
    task: flat_terrain_alternative_imu_fv2_torque_ankle_collision
    env_config_path: null

    home_keyframe_name: home
    start_pose_default: [0.0, 0.0, 0.0]   # x, y, yaw

    physics_hz: 500
    control_hz: 50
    fps: 50
    render_every: 1
    show_contact: true

    # Action scaling (if null: tries to read from env config; else uses 1.0)
    action_scale: null

    output_dir: video_rollout_phonebot_general

    rollouts:
      - name: forward_track
        out: forward_track.mp4
        command: [1.0, 0.0, 0.0]
        start_pose: [0.0, 0.0, 0.0]
        camera: track
        max_steps: 1000

      - name: side_track
        out: side_track.mp4
        command: [0.0, 0.5, 0.0]
        camera: track

      - name: turn_track
        out: turn_track.mp4
        command: [0.0, 0.0, 1.5]
        camera: track

  phonebot_flat_fv2_torque_ankle_tflite:
    policy_format: tflite
    policy_path: exported_tflite/phonebot_flat_alter_fv2_torque_awared_home_straight_v1_actor.tflite
    tflite_backend: litert    # litert|tensorflow
    tflite_num_threads: 1

    xml_path: models/model_phonebot_fred_v2_torque_version/scene_joystick_flat_terrain_alter_v2_ankle_collision.xml
    env_name: PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision
    task: flat_terrain_alternative_imu_fv2_torque_ankle_collision
    env_config_path: null

    home_keyframe_name: home_straight
    start_pose_default: [0.0, 0.0, 0.0]

    physics_hz: 500
    control_hz: 50
    fps: 50
    render_every: 1
    show_contact: true
    action_scale: null

    output_dir: video_rollout_phonebot_general

    rollouts:
      - name: forward_track_tflite
        out: forward_track_tflite.mp4
        command: [1.0, 0.0, 0.0]
        camera: track
        max_steps: 1000

