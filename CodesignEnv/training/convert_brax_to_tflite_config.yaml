    env_name: PhonebotJoystickRoughTerrainAlterFV2TorqueAwared
    env_config_path: null
    out_dir: exported_tflite
    out_tflite: phonebot_rough_alter_fv2_torque_awared_home_straight_v1_actor.tflite
    out_metadata_json: phonebot_rough_alter_fv2_torque_awared_home_straight_v1_actor_metadata.json

  phonebot_flat_alter_fv2_torque_awared_ankle_collision_155975680:
