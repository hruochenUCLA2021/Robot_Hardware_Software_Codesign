  chopstickbot_rough_alter_torque_awared_curriculum_v1_v1:
    checkpoint_dir: checkpoints/ChopstickbotJoystickRoughTerrainAlterTorqueAwared_rough_curriculum_v1_v1
    env_name: ChopstickbotJoystickRoughTerrainAlterTorqueAwared
    env_config_path: null
    out_dir: exported_tflite
    out_tflite: chopstickbot_rough_alter_torque_awared_curriculum_v1_v1_actor.tflite
    out_metadata_json: chopstickbot_rough_alter_torque_awared_curriculum_v1_v1_actor_metadata.json

export:
  # If true, only load checkpoint and print shapes (no TFLite export).
  dry_run: false

  # Optionally write `ppo_network_config.json` into the checkpoint leaf directory,
  # so you can later use `ppo_checkpoint.load_policy` (actor-only load) for fast rollout.
  #
  # Modes:
  # - skip      : do nothing
  # - if_missing: write only if JSON is missing
  # - replace   : always overwrite (useful if JSON came from another device/Brax version)
  ppo_network_config_json:
    # mode: skip
    mode: if_missing
    # mode: replace

  # When `job_name` is a list, keep going even if one job fails.
  continue_on_error: true

  # Input signature for exported TFLite model.
  # - "vector": input tensor shape (obs_dim,)
  # - "batch":  input tensor shape (1, obs_dim)  # thsi is the formate that the android app using right now for tflite model !!!
  # input_mode: vector
  input_mode: batch

  # TFLite options
  use_select_tf_ops: true
  optimize: false

