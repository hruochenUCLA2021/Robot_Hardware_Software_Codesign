## Convert a trained Brax (PPO) actor policy to TFLite.
##
## Usage:
##   python convert_brax_to_tflite.py
##   python convert_brax_to_tflite.py convert_brax_to_tflite_config.yaml
##
## Notes:
## - This exports the **actor** (policy) only. The critic ("privileged_state")
##   is not needed on the real robot.
## - Input is obs["state"] (PhoneBot: 52 floats).
## - Output is action (PhoneBot: 13 floats), typically in [-1, 1] due to tanh.
##
## You can switch between checkpoints by changing `job_name`.

# job_name can be:
# - a single string (one job)
# - a list of strings (multiple jobs)
# - "all" (run every job under `jobs:`)
job_name:
  # - phonebot_flat_ok_v6
  # - phonebot_flat_alter_v2
  # - phonebot_flat_alter_fv2
  # - phonebot_flat_alter_fv2_torque_awared_home_straight_v1
  # - phonebot_rough_alter_fv2_torque_awared_home_straight_v1
  # - phonebot_flat_alter_fv2_torque_awared_ankle_collision_155975680
  # - phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v1_look_unstable
  # - phonebot_half_v2_89128960
  # - phonebot_half_v2_178257920
  # - phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v3
  - phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v4
  # - chopstickbot_flat_alter_torque_awared_curriculum_v1_v1
  # - chopstickbot_rough_alter_torque_awared_curriculum_v1_v1

jobs:
  phonebot_flat_ok_v6:
    checkpoint_dir: checkpoints/PhonebotJoystickFlatTerrain_flat_ok_v6
    env_name: PhonebotJoystickFlatTerrain
    env_config_path: null
    out_dir: exported_tflite
    out_tflite: phonebot_flat_ok_v6_actor.tflite
    out_metadata_json: phonebot_flat_ok_v6_actor_metadata.json

  phonebot_flat_alter_v2:
    checkpoint_dir: checkpoints/PhonebotJoystickFlatTerrainAlter_flat_v2
    env_name: PhonebotJoystickFlatTerrainAlter
