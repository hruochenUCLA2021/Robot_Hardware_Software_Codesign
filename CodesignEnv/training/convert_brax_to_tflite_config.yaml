    env_name: PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision
    env_config_path: null
    out_dir: exported_tflite
    out_tflite: phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v3_actor.tflite
    out_metadata_json: phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v3_actor_metadata.json

  phonebot_flat_alter_fv2_torque_awared_ankle_collision_home_straight_v4:
    checkpoint_dir: checkpoints/PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision_flat_v4
    env_name: PhonebotJoystickFlatTerrainAlterFV2TorqueAwaredAnkleCollision
    env_config_path: null
    out_dir: exported_tflite
