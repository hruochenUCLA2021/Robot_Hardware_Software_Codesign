  chopstickbot_flat_alter_torque_awared_curriculum_v1_v1:
    checkpoint_dir: checkpoints/ChopstickbotJoystickFlatTerrainAlterTorqueAwared_flat_curriculum_v1_v1
    env_name: ChopstickbotJoystickFlatTerrainAlterTorqueAwared
    env_config_path: null
    out_dir: exported_tflite
