# alter means the imu frame is on the torso, not the base_motor_link



checkpoint_dir: checkpoints/ChopstickbotJoystickFlatTerrainAlterUniformLeg_flat/final
env_name: ChopstickbotJoystickFlatTerrainAlterUniformLeg
output_dir: video_rollout_chopstickbot_alter_uniform_leg

# Optional overrides for morphology-conditioned env:
# - If xml_path_override is set, the env will load this exact scene XML.
# - If leg_length_m is set, it will be appended (normalized) to the policy obs.
# If you omit them, the env falls back to the task default (len_0.20m) defined in hi_constants.py.
xml_path_override: models/model_chopstickbot_leglen_sweep/len_0.50m/scene_joystick_flat_terrain_chopstickbot.xml
leg_length_m: 0.5



# checkpoint_dir: checkpoints/ChopstickbotJoystickFlatTerrain_flat/final
# env_name: ChopstickbotJoystickFlatTerrain
# output_dir: video_rollout_chopstickbot


# Global toggle: whether to visualize contact points/forces in rendered videos.
# Can be overridden per rollout below.
show_contact: true
# show_contact: false

# Optional: path to a YAML env_config (e.g. a saved `env_config.yaml` from a
# training run). If null, the default joystick env config is used.
env_config_path: null

# Automatically plot qpos/qvel curves from recorded JSON after rollout.
auto_plot: true

# Global defaults (can be overridden per rollout)
max_steps: 1000
render_every: 1
anim_skip: 10

rollouts:
  # Forward walking
  - name: flat_forward_track
    out: chopstickbot_flat_forward_track.mp4
    command: [0.5, 0.0, 0.0]
    start_pose: [0.0, 0.0, 0.0]
    camera: track

  - name: flat_forward_fixed
    out: chopstickbot_flat_forward_fixed.mp4
    command: [0.5, 0.0, 0.0]
    start_pose: [0.0, 0.0, 0.0]
    camera: null

  # Sideways walking
  - name: flat_side_track
    out: chopstickbot_flat_side_track.mp4
    command: [0.0, 0.25, 0.0]
    start_pose: [0.0, 0.0, 0.0]
    camera: track

  - name: flat_side_fixed
    out: chopstickbot_flat_side_fixed.mp4
    command: [0.0, 0.25, 0.0]
    start_pose: [0.0, 0.0, 0.0]
    camera: null

  # Turn in place
  - name: flat_turn_track
    out: chopstickbot_flat_turn_track.mp4
    command: [0.0, 0.0, 0.75]
    start_pose: [0.0, 0.0, 0.0]
    camera: track

  - name: flat_turn_fixed
    out: chopstickbot_flat_turn_fixed.mp4
    command: [0.0, 0.0, 0.75]
    start_pose: [0.0, 0.0, 0.0]
    camera: null


